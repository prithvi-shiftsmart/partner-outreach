# Backup & Floater shift replay fixtures.
#
# Sourced from 75 real production conversations (5/4–6/2/2026) where partners
# asked about backup shifts, floater shifts, promotion, dismissal, or payment.
# These test that the KB updates produce correct responses.
#
# Schema matches concierge_replay.yaml — see that file for full docs.
#

fixtures:
  # ──────────────── 1. Backup at store, primary showed up ────────────────
  - name: backup_primary_showed_up
    partner_id: synthetic-backup-01
    conversation_id: synthetic-backup-01
    first_name: India
    last_name: Hayes
    zone_description: Lexington_KY_1
    phone_number: "+15551230001"
    start_date: "6/2/2026"
    started_at: "6/2/2026 06:00:00"
    status: op_completed
    messages:
      - from: concierge
        content: "Hey India! Just checking in — you've got a shift coming up tomorrow. Let me know if you have any questions."
      - from: partner
        content: "I'm the backup and the person already showed up. Do I leave?"
    expected:
      must_contain:
        - "leave"
        - "paid"
        - "app"
      must_not_contain:
        - "call"
        - "phone call"
        - "text you"
        - "turn-away"
        - "support@shiftsmart.com"

