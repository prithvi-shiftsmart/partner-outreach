# Concierge replay fixtures.
#
# Each fixture replays a real production conversation through assemble_prompt()
# and asserts the model output matches the expected behavior. Sourced from the
# 4/27–4/29/2026 production conversation export (gemini-2.5-flash). The local
# replay runs on Claude Haiku 4.5 for the closest-available production parity.
#
# Schema:
#   fixtures:
#     - name: human-readable label (used to filter via CLI)
#       partner_id: source production partner_id
#       conversation_id: source production conversation_id (for validation xlsx)
#       first_name: partner first name (injected into prompt)
#       last_name: partner last name (validation xlsx)
#       zone_description: market/zone (validation xlsx)
#       phone_number: SMS phone (validation xlsx)
#       start_date: original start date (validation xlsx)
#       started_at: original started_at (validation xlsx)
#       status: original conversation status (validation xlsx)
#       messages:
#         - from: partner | concierge          (alias us/agent both ok for outbound)
#           content: literal message text
#       expected:
#         must_be_empty: true                  (any non-trivial output fails)
#         must_equal: "verbatim string"
#         must_contain: ["substring1", ...]    (case-insensitive)
#         must_not_contain: ["substring1", ...]
#         regex_match: ["^Yes\\b", ...]
#

fixtures:
